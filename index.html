<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trainer Hub</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
:root{--primary:#1a2e4a;--primary-light:#243d61;--accent:#00b4d8;--accent-light:#48cae4;--success:#2dc653;--warning:#f4a261;--danger:#e63946;--bg:#f0f4f8;--card:#ffffff;--text:#1e293b;--text-light:#64748b;--border:#e2e8f0;--shadow:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.05);--shadow-md:0 4px 12px rgba(0,0,0,.08);--shadow-lg:0 12px 28px rgba(0,0,0,.12);--r:14px;--r-sm:8px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
/* HEADER */
.hdr{background:var(--primary);color:#fff;padding:0 1.75rem;height:62px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200;box-shadow:var(--shadow-md)}
.hdr-logo{display:flex;align-items:center;gap:.7rem;font-size:1.15rem;font-weight:800;color:#fff;cursor:pointer;user-select:none}
.hdr-logo i{color:var(--accent-light)}
.hdr-nav{display:flex;gap:.15rem}
.nav-btn{background:none;border:none;color:rgba(255,255,255,.65);padding:.45rem .9rem;border-radius:var(--r-sm);cursor:pointer;font-size:.85rem;font-family:inherit;font-weight:500;transition:.15s}
.nav-btn:hover,.nav-btn.active{background:rgba(255,255,255,.14);color:#fff}
.main{max-width:1160px;margin:0 auto;padding:2rem 1.5rem}
/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:.4rem;padding:.55rem 1.1rem;border-radius:var(--r-sm);border:none;cursor:pointer;font-family:inherit;font-size:.85rem;font-weight:600;transition:.15s;white-space:nowrap}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:var(--accent-light);transform:translateY(-1px)}
.btn-secondary{background:var(--primary);color:#fff}
.btn-secondary:hover{background:var(--primary-light)}
.btn-outline{background:transparent;border:2px solid var(--border);color:var(--text)}
.btn-outline:hover{border-color:var(--accent);color:var(--accent)}
.btn-ghost{background:transparent;color:var(--text-light);padding:.35rem .7rem}
.btn-ghost:hover{background:var(--bg);color:var(--text)}
.btn-danger{background:var(--danger);color:#fff}
.btn-danger:hover{opacity:.88}
.btn-sm{padding:.3rem .7rem;font-size:.78rem}
/* CARDS */
.card{background:var(--card);border-radius:var(--r);box-shadow:var(--shadow);border:1px solid var(--border)}
.card-hdr{padding:1.1rem 1.4rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.card-body{padding:1.4rem}
.card-hdr-title{font-weight:700;font-size:.95rem}
/* BADGES */
.badge{display:inline-flex;align-items:center;gap:.22rem;padding:.18rem .55rem;border-radius:100px;font-size:.72rem;font-weight:600}
.badge-success{background:#d1fae5;color:#065f46}
.badge-warning{background:#fef3c7;color:#92400e}
.badge-danger{background:#fee2e2;color:#991b1b}
.badge-info{background:#dbeafe;color:#1e40af}
.badge-gray{background:#f1f5f9;color:#475569}
.badge-purple{background:#ede9fe;color:#5b21b6}
/* STATS */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:1rem;margin-bottom:1.75rem}
.stat-card{background:var(--card);border-radius:var(--r);padding:1.1rem;border:1px solid var(--border);box-shadow:var(--shadow);display:flex;align-items:center;gap:.9rem}
.stat-icon{width:44px;height:44px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.15rem;flex-shrink:0}
.si-blue{background:#dbeafe;color:#1d4ed8}
.si-teal{background:#d0fef8;color:#0d9488}
.si-green{background:#dcfce7;color:#15803d}
.si-orange{background:#ffedd5;color:#c2410c}
.si-purple{background:#ede9fe;color:#6d28d9}
.stat-value{font-size:1.65rem;font-weight:800;line-height:1}
.stat-label{font-size:.75rem;color:var(--text-light);margin-top:.2rem}
/* TRAINER CARDS */
.trainers-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(255px,1fr));gap:1.1rem;margin-bottom:1.75rem}
.trainer-card{background:var(--card);border-radius:var(--r);border:1px solid var(--border);box-shadow:var(--shadow);overflow:hidden;cursor:pointer;transition:.18s}
.trainer-card:hover{transform:translateY(-3px);box-shadow:var(--shadow-lg);border-color:var(--accent)}
.tc-hdr{padding:1.2rem;display:flex;align-items:center;gap:.9rem}
.trainer-av{width:52px;height:52px;border-radius:50%;display:flex;align-items:center;justify-content:function:center;font-size:1.25rem;font-weight:800;color:#fff;flex-shrink:0}
.trainer-av{display:flex;align-items:center;justify-content:center}
.trainer-name{font-size:1.05rem;font-weight:700}
.trainer-role{font-size:.75rem;color:var(--text-light)}
.tc-stats{display:grid;grid-template-columns:repeat(3,1fr);border-top:1px solid var(--border)}
.tc-stat{padding:.85rem;text-align:center;border-right:1px solid var(--border)}
.tc-stat:last-child{border-right:none}
.tc-stat-val{font-size:1.2rem;font-weight:800;color:var(--primary)}
.tc-stat-lbl{font-size:.68rem;color:var(--text-light);margin-top:.15rem}
.tc-foot{padding:.8rem 1.2rem;background:#f8fafd;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;font-size:.78rem;color:var(--text-light)}
/* TABLE */
.tbl-wrap{overflow-x:auto}
.tbl{width:100%;border-collapse:collapse;min-width:620px}
.tbl th{text-align:left;padding:.65rem 1rem;font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--text-light);background:#f8fafd;border-bottom:1px solid var(--border)}
.tbl td{padding:.85rem 1rem;border-bottom:1px solid var(--border);font-size:.84rem;vertical-align:middle}
.tbl tr:last-child td{border-bottom:none}
.tbl tbody tr:hover td{background:#f8fdff;cursor:pointer}
.av-sm{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.75rem;font-weight:700;color:#fff;flex-shrink:0}
/* ASSESSMENT DOTS */
.a-dots{display:flex;gap:.35rem}
.a-dot{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.62rem;font-weight:700;border:2px solid}
.a-done{background:var(--success);border-color:var(--success);color:#fff}
.a-due{background:#fff1f2;border-color:var(--danger);color:var(--danger)}
.a-soon{background:#fffbeb;border-color:var(--warning);color:var(--warning)}
.a-future{background:#f1f5f9;border-color:var(--border);color:var(--text-light)}
/* PROGRESS BAR */
.prog-bar{height:6px;background:var(--border);border-radius:100px;overflow:hidden}
.prog-fill{height:100%;border-radius:100px;background:var(--accent)}
/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.48);z-index:1000;display:flex;align-items:center;justify-content:center;padding:1rem}
.overlay{animation:fadeIn .18s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal{background:#fff;border-radius:var(--r);box-shadow:var(--shadow-lg);width:100%;max-width:560px;max-height:90vh;overflow-y:auto;animation:slideUp .2s ease}
.modal-lg{max-width:720px}
@keyframes slideUp{from{transform:translateY(18px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-hdr{padding:1.25rem 1.4rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:#fff;z-index:2}
.modal-title{font-size:1.05rem;font-weight:700}
.modal-close{background:none;border:none;cursor:pointer;color:var(--text-light);font-size:1.15rem;padding:.2rem .4rem;border-radius:4px;transition:.15s}
.modal-close:hover{color:var(--danger)}
.modal-body{padding:1.4rem}
.modal-foot{padding:1rem 1.4rem;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:.6rem;background:#fff;position:sticky;bottom:0}
/* FORMS */
.form-group{margin-bottom:1.1rem}
.form-label{display:block;font-size:.83rem;font-weight:600;margin-bottom:.35rem}
.form-hint{font-size:.73rem;color:var(--text-light);margin-top:.2rem}
.form-control{width:100%;padding:.58rem .8rem;border:2px solid var(--border);border-radius:var(--r-sm);font-family:inherit;font-size:.84rem;color:var(--text);background:#fff;transition:.15s;outline:none}
.form-control:focus{border-color:var(--accent)}
textarea.form-control{resize:vertical;min-height:80px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
.form-section{font-size:.73rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--text-light);margin:1.4rem 0 .9rem;padding-bottom:.45rem;border-bottom:1px solid var(--border)}
/* RATING */
.rating-wrap{display:flex;gap:.28rem;flex-wrap:wrap;margin-top:.4rem}
.r-btn{width:32px;height:32px;border-radius:50%;border:2px solid var(--border);background:#fff;cursor:pointer;font-size:.75rem;font-weight:600;transition:.13s;display:flex;align-items:center;justify-content:center}
.r-btn:hover{border-color:var(--accent);color:var(--accent)}
.r-btn.on{background:var(--accent);border-color:var(--accent);color:#fff}
/* TABS */
.tabs{display:flex;border-bottom:2px solid var(--border);margin-bottom:1.5rem}
.tab-btn{padding:.65rem 1.15rem;border:none;background:none;cursor:pointer;font-family:inherit;font-size:.84rem;font-weight:500;color:var(--text-light);border-bottom:2px solid transparent;margin-bottom:-2px;transition:.15s}
.tab-btn:hover{color:var(--text)}
.tab-btn.active{color:var(--accent);border-bottom-color:var(--accent);font-weight:700}
/* BACK BTN */
.back-btn{display:inline-flex;align-items:center;gap:.4rem;color:var(--accent);cursor:pointer;font-size:.84rem;font-weight:500;margin-bottom:1.25rem;border:none;background:none;font-family:inherit;padding:0}
.back-btn:hover{text-decoration:underline}
/* SECTION HEADER */
.sec-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.1rem}
.sec-title{font-size:1.1rem;font-weight:700}
/* TRAINEE HEADER */
.trainee-top{display:flex;align-items:flex-start;gap:1.25rem;margin-bottom:1.75rem;flex-wrap:wrap}
.av-lg{width:68px;height:68px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.6rem;font-weight:800;color:#fff;flex-shrink:0}
/* ASSESSMENT CARDS */
.a-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem}
.a-card{border-radius:var(--r);border:2px solid var(--border);overflow:hidden;transition:.18s}
.a-card.done{border-color:var(--success)}
.a-card.due{border-color:var(--danger)}
.a-card.clickable:hover{border-color:var(--accent);cursor:pointer;transform:translateY(-2px)}
.a-card-hdr{padding:.9rem 1rem;display:flex;align-items:center;justify-content:space-between}
.a-day-lbl{font-size:.65rem;color:var(--text-light);margin-top:.1rem}
.a-card-body{padding:1rem;border-top:1px solid var(--border);font-size:.82rem}
/* CHECKIN ITEMS */
.ci-item{display:flex;align-items:center;gap:.9rem;padding:.8rem 1rem;border-radius:var(--r-sm);border:1px solid var(--border);margin-bottom:.45rem;cursor:pointer;transition:.14s}
.ci-item:hover{border-color:var(--accent);background:#f0fdff}
.ci-week-badge{width:36px;height:36px;border-radius:50%;background:var(--primary);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.82rem;flex-shrink:0}
/* EMPTY STATE */
.empty{text-align:center;padding:3rem 1rem;color:var(--text-light)}
.empty i{font-size:2.2rem;opacity:.4;margin-bottom:.75rem;display:block}
.empty p{font-size:.9rem}
/* PROTOCOL PILLS */
.protocol-pill{display:inline-flex;align-items:center;gap:.25rem;padding:.22rem .6rem;border-radius:100px;background:#e0f2fe;color:#0369a1;font-size:.72rem;font-weight:600;margin:.1rem}
/* PAGE SECTIONS */
.page{display:none}
.page.active{display:block}
/* ALERT */
.alert{padding:.75rem 1rem;border-radius:var(--r-sm);font-size:.83rem;margin-bottom:1rem;display:flex;align-items:center;gap:.5rem}
.alert-info{background:#dbeafe;color:#1e40af;border-left:4px solid var(--accent)}
.alert-success{background:#d1fae5;color:#065f46;border-left:4px solid var(--success)}
.select-trainee-row{display:flex;align-items:center;gap:.6rem;flex-wrap:wrap;margin-top:.5rem}
@media(max-width:600px){.a-grid{grid-template-columns:1fr}.form-grid{grid-template-columns:1fr}.trainers-grid{grid-template-columns:1fr}}
</style>
</head>
<body>

<header class="hdr">
  <div class="hdr-logo" onclick="goHome()">
    <i class="fa-solid fa-dumbbell"></i>
    Trainer Hub
  </div>
  <nav class="hdr-nav">
    <button class="nav-btn active" id="nav-hub" onclick="showPage('hub')"><i class="fa-solid fa-house"></i> Hub</button>
    <button class="nav-btn" id="nav-trainers" onclick="showPage('trainers')"><i class="fa-solid fa-users"></i> Trainers</button>
    <button class="nav-btn" id="nav-trainees" onclick="showPage('trainees')"><i class="fa-solid fa-user-check"></i> Trainees</button>
  </nav>
</header>

<main class="main">
  <!-- HUB PAGE -->
  <div class="page active" id="page-hub">
    <div style="margin-bottom:1.75rem">
      <h1 style="font-size:1.5rem;font-weight:800">Dashboard Overview</h1>
      <p style="color:var(--text-light);font-size:.88rem;margin-top:.25rem">Welcome back. Here's how your team is doing.</p>
    </div>
    <div class="stats-grid" id="hub-stats"></div>
    <div class="sec-hdr">
      <span class="sec-title">Trainers</span>
      <button class="btn btn-primary btn-sm" onclick="openAddTrainer()"><i class="fa-solid fa-plus"></i> Add Trainer</button>
    </div>
    <div class="trainers-grid" id="hub-trainer-cards"></div>
    <div class="sec-hdr" style="margin-top:1.25rem">
      <span class="sec-title">Recent Activity</span>
    </div>
    <div class="card"><div class="card-body" id="recent-activity"></div></div>
  </div>

  <!-- TRAINERS PAGE -->
  <div class="page" id="page-trainers">
    <div class="sec-hdr">
      <div>
        <h1 style="font-size:1.35rem;font-weight:800">Trainers</h1>
        <p style="color:var(--text-light);font-size:.83rem;margin-top:.2rem">Manage trainer profiles and assignments</p>
      </div>
      <button class="btn btn-primary" onclick="openAddTrainer()"><i class="fa-solid fa-plus"></i> Add Trainer</button>
    </div>
    <div class="trainers-grid" id="trainers-grid"></div>
  </div>

  <!-- TRAINEES PAGE -->
  <div class="page" id="page-trainees">
    <div class="sec-hdr">
      <div>
        <h1 style="font-size:1.35rem;font-weight:800">All Trainees</h1>
        <p style="color:var(--text-light);font-size:.83rem;margin-top:.2rem">View and manage all trainees</p>
      </div>
      <button class="btn btn-primary" onclick="openAddTrainee(null)"><i class="fa-solid fa-plus"></i> Add Trainee</button>
    </div>
    <div class="card">
      <div class="card-hdr">
        <span class="card-hdr-title">All Trainees</span>
        <input class="form-control" style="width:220px;padding:.35rem .7rem;font-size:.8rem" placeholder="Search trainees..." id="trainee-search" oninput="renderAllTrainees()">
      </div>
      <div class="tbl-wrap"><table class="tbl" id="all-trainees-tbl">
        <thead><tr><th>Name</th><th>Trainer</th><th>Protocol</th><th>Start Date</th><th>Assessments</th><th>Status</th><th></th></tr></thead>
        <tbody id="all-trainees-body"></tbody>
      </table></div>
    </div>
  </div>

  <!-- TRAINER DETAIL PAGE -->
  <div class="page" id="page-trainer-detail">
    <button class="back-btn" onclick="showPage('trainers')"><i class="fa-solid fa-arrow-left"></i> Back to Trainers</button>
    <div id="trainer-detail-content"></div>
  </div>

  <!-- TRAINEE DETAIL PAGE -->
  <div class="page" id="page-trainee-detail">
    <button class="back-btn" id="trainee-back-btn" onclick="goBackFromTrainee()"><i class="fa-solid fa-arrow-left"></i> Back</button>
    <div id="trainee-detail-content"></div>
  </div>
</main>

<!-- MODALS -->
<div id="modal-root"></div>

<script>
// ═══════════════════════════════════════════
//  DATA LAYER
// ═══════════════════════════════════════════
const COLORS = ['#1a2e4a','#0d9488','#7c3aed','#be185d','#b45309','#065f46','#1d4ed8','#9f1239'];
const PROTOCOLS = ['Strength & Conditioning','Weight Loss','Muscle Gain','Athletic Performance','Rehabilitation','Endurance Training','Flexibility & Mobility','Functional Fitness','Nutrition Support','Custom Protocol'];

function loadData(){
  const d = localStorage.getItem('trainerHub_v2');
  if(!d) return initDefault();
  return JSON.parse(d);
}
function saveData(data){ localStorage.setItem('trainerHub_v2', JSON.stringify(data)); }

function initDefault(){
  const data = {
    trainers:[
      {id:'t1',name:'Julia Martinez',email:'julia@gym.com',phone:'',color:'#1a2e4a',initials:'JM',notes:'Head trainer, specializes in athletic performance'},
      {id:'t2',name:'Shirley Thompson',email:'shirley@gym.com',phone:'',color:'#0d9488',initials:'ST',notes:'Certified nutritionist and personal trainer'},
      {id:'t3',name:'Shawna Williams',email:'shawna@gym.com',phone:'',color:'#7c3aed',initials:'SW',notes:'Rehab specialist and functional fitness expert'},
      {id:'t4',name:'Trish Garcia',email:'trish@gym.com',phone:'',color:'#be185d',initials:'TG',notes:'Endurance and weight loss specialist'},
    ],
    trainees:[],
    assessments:[],
    checkins:[],
    activity:[]
  };
  saveData(data);
  return data;
}

let DB = loadData();
let currentTrainerId = null;
let currentTraineeId = null;
let traineeBackPage = 'trainees';

// ═══════════════════════════════════════════
//  NAVIGATION
// ═══════════════════════════════════════════
function showPage(page){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('page-'+page).classList.add('active');
  const nb = document.getElementById('nav-'+page);
  if(nb) nb.classList.add('active');
  if(page==='hub') renderHub();
  if(page==='trainers') renderTrainers();
  if(page==='trainees') renderAllTrainees();
}
function goHome(){ showPage('hub'); }
function goBackFromTrainee(){
  if(traineeBackPage==='trainer-detail') showTrainerDetail(currentTrainerId);
  else showPage('trainees');
}

// ═══════════════════════════════════════════
//  HUB
// ═══════════════════════════════════════════
function renderHub(){
  const totalTrainees = DB.trainees.length;
  const activeTrainees = DB.trainees.filter(t=>t.status==='active').length;
  const dueAssessments = getDueAssessmentsCount();
  const completedAssessments = DB.assessments.length;

  document.getElementById('hub-stats').innerHTML = `
    <div class="stat-card"><div class="stat-icon si-blue"><i class="fa-solid fa-users"></i></div><div><div class="stat-value">${DB.trainers.length}</div><div class="stat-label">Trainers</div></div></div>
    <div class="stat-card"><div class="stat-icon si-teal"><i class="fa-solid fa-user-check"></i></div><div><div class="stat-value">${totalTrainees}</div><div class="stat-label">Total Trainees</div></div></div>
    <div class="stat-card"><div class="stat-icon si-green"><i class="fa-solid fa-circle-check"></i></div><div><div class="stat-value">${activeTrainees}</div><div class="stat-label">Active Trainees</div></div></div>
    <div class="stat-card"><div class="stat-icon si-orange"><i class="fa-solid fa-clipboard-list"></i></div><div><div class="stat-value">${dueAssessments}</div><div class="stat-label">Assessments Due</div></div></div>
    <div class="stat-card"><div class="stat-icon si-purple"><i class="fa-solid fa-chart-line"></i></div><div><div class="stat-value">${completedAssessments}</div><div class="stat-label">Assessments Done</div></div></div>
  `;

  // Trainer cards
  const el = document.getElementById('hub-trainer-cards');
  if(!DB.trainers.length){ el.innerHTML='<p style="color:var(--text-light);font-size:.88rem">No trainers yet. Add one above!</p>'; return; }
  el.innerHTML = DB.trainers.map(t=>trainerCardHTML(t)).join('');

  // Recent activity
  const act = [...DB.activity].reverse().slice(0,8);
  const ael = document.getElementById('recent-activity');
  if(!act.length){ ael.innerHTML='<div class="empty"><i class="fa-solid fa-clock-rotate-left"></i><p>No activity yet</p></div>'; return; }
  ael.innerHTML = act.map(a=>`
    <div style="display:flex;align-items:flex-start;gap:.75rem;padding:.65rem 0;border-bottom:1px solid var(--border)">
      <div style="width:32px;height:32px;border-radius:50%;background:#e0f2fe;color:#0369a1;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:.8rem"><i class="fa-solid ${a.icon||'fa-circle-dot'}"></i></div>
      <div><div style="font-size:.84rem;font-weight:500">${a.text}</div><div style="font-size:.72rem;color:var(--text-light);margin-top:.15rem">${fmtTime(a.ts)}</div></div>
    </div>`).join('');
}

function getDueAssessmentsCount(){
  let count=0;
  DB.trainees.forEach(tr=>{
    if(tr.status!=='active') return;
    [30,60,90].forEach(day=>{
      const key=`${tr.id}_${day}`;
      const done = DB.assessments.find(a=>a.traineeId===tr.id && a.day===day);
      if(!done && tr.startDate){
        const due = new Date(tr.startDate);
        due.setDate(due.getDate()+day);
        if(new Date()>=due) count++;
      }
    });
  });
  return count;
}

      </div></td>
      <td><span class="badge ${tr.status==='active'?'badge-success':tr.status==='completed'?'badge-info':'badge-gray'}">${tr.status||'active'}</span></td>
      <td><button class="btn btn-ghost btn-sm" onclick="event.stopPropagation();openEditTrainee('${tr.id}')"><i class="fa-solid fa-pen"></i></button></td>
    </tr>`;
  }).join('');
  return `<table class="tbl"><thead><tr><th>Name</th>${!fromTrainerId?'<th>Trainer</th>':''}<th>Protocol</th><th>Start Date</th><th>Assessments</th><th>Status</th><th></th></tr></thead><tbody>${rows}</tbody></table>`;
}

function getAssessmentStatus(trainee){
  const result={};
  const start = trainee.startDate ? new Date(trainee.startDate) : null;
  [30,60,90].forEach(day=>{
    const done = DB.assessments.find(a=>a.traineeId===trainee.id && a.day===day);
    if(done){ result[day]='done'; return; }
    if(!start){ result[day]='future'; return; }
    const dueDate = new Date(start); dueDate.setDate(dueDate.getDate()+day);
    const now = new Date();
    const diff = (dueDate-now)/(1000*60*60*24);
    if(diff<0) result[day]='due';
    else if(diff<=7) result[day]='soon';
    else result[day]='future';
  });
  return result;
}

function saveTrainer(id){
  const name = document.getElementById('f-tname').value.trim();
  if(!name) return alert('Name is required');
  const color = document.getElementById('f-tcolor').value||COLORS[0];
  const parts = name.split(' ');
  const initials = parts.map(p=>p[0]).join('').substring(0,2).toUpperCase();
  if(id){
    const t = DB.trainers.find(x=>x.id===id);
    Object.assign(t,{name,email:document.getElementById('f-temail').value,phone:document.getElementById('f-tphone').value,notes:document.getElementById('f-tnotes').value,color,initials});
  } else {
    DB.trainers.push({id:'t'+Date.now(),name,email:document.getElementById('f-temail').value,phone:document.getElementById('f-tphone').value,notes:document.getElementById('f-tnotes').value,color,initials});
    logActivity(`Added trainer ${name}`,'fa-user-plus');
  }
  saveData(DB); forceClose(); refresh();
}

function deleteTrainer(id){
  if(!confirm('Delete this trainer? Their trainees will become unassigned.')) return;
  DB.trainees.filter(t=>t.trainerId===id).forEach(t=>t.trainerId=null);
  DB.trainers = DB.trainers.filter(t=>t.id!==id);
  saveData(DB); forceClose(); showPage('trainers');
}

function saveTrainee(id){
  const name = document.getElementById('f-nname').value.trim();
  if(!name) return alert('Name is required');
  const parts = name.split(' ');
  const initials = parts.map(p=>p[0]).join('').substring(0,2).toUpperCase();
  const obj = {
    name, initials,
    email: document.getElementById('f-nemail').value,
    phone: document.getElementById('f-nphone').value,
    dob: document.getElementById('f-ndob').value,
    trainerId: document.getElementById('f-ntrainer').value||null,
    startDate: document.getElementById('f-nstart').value,
    protocol: document.getElementById('f-nprotocol').value,
    status: document.getElementById('f-nstatus').value||'active',
    goals: document.getElementById('f-ngoals').value,
    notes: document.getElementById('f-nnotes').value,
  };
  if(id){
    const t=DB.trainees.find(x=>x.id===id);
    Object.assign(t,obj);
    logActivity(`Updated trainee ${name}`,'fa-pen');
  } else {
    const newT={id:'tr'+Date.now(),...obj,progressNotes:[]};
    DB.trainees.push(newT);
    logActivity(`Assigned new trainee ${name} to ${DB.trainers.find(t=>t.id===obj.trainerId)?.name||'no trainer'}`,'fa-user-plus');
  }
  saveData(DB); forceClose(); refresh();
}

function deleteTrainee(id){
  if(!confirm('Remove this trainee and all their records?')) return;
  const t=DB.trainees.find(x=>x.id===id);
  DB.trainees=DB.trainees.filter(x=>x.id!==id);
  DB.assessments=DB.assessments.filter(a=>a.traineeId!==id);
  DB.checkins=DB.checkins.filter(c=>c.traineeId!==id);
  saveData(DB); forceClose();
  if(traineeBackPage==='trainer-detail') showTrainerDetail(currentTrainerId);
  else showPage('trainees');
}

// ═══════════════════════════════════════════
//  HELPERS
// ═══════════════════════════════════════════
function todayStr(){ return new Date().toISOString().split('T')[0]; }
function fmtDate(s){
  if(!s) return '—';
  const d=new Date(s+'T12:00:00');
  return d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
}
function fmtTime(ts){
  if(!ts) return '';
  const d=new Date(ts);
  const now=new Date();
  const diff=Math.floor((now-d)/1000);
  if(diff<60) return 'just now';
  if(diff<3600) return Math.floor(diff/60)+'m ago';
  if(diff<86400) return Math.floor(diff/3600)+'h ago';
  return fmtDate(d.toISOString().split('T')[0]);
}
function logActivity(text, icon){
  DB.activity.push({ts:Date.now(),text,icon});
  if(DB.activity.length>50) DB.activity=DB.activity.slice(-50);
}
function refresh(){
  const activePage = [...document.querySelectorAll('.page')].find(p=>p.classList.contains('active'));
  if(activePage){
    if(activePage.id==='page-hub') renderHub();
    else if(activePage.id==='page-trainers') renderTrainers();
    else if(activePage.id==='page-trainees') renderAllTrainees();
    else if(activePage.id==='page-trainer-detail') showTrainerDetail(currentTrainerId);
    else if(activePage.id==='page-trainee-detail') showTraineeDetail(currentTraineeId, traineeBackPage==='trainer-detail'?currentTrainerId:'');
  }
}
